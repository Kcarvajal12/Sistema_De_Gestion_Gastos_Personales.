<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Control de Gastos Personales</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      font-size: 40px;
    }

    .resumen, form, table {
      background: white;
      padding: 25px;
      margin: 25px auto;
      max-width: 1100px;
      border-radius: 10px;
      box-shadow: 0 0 12px #ccc;
    }

    .resumen {
      display: flex;
      justify-content: space-around;
      text-align: center;
    }

    .resumen h3 {
      font-size: 24px;
    }

    .resumen p {
      font-size: 22px;
      font-weight: bold;
    }

    input, select, button {
      padding: 12px;
      margin: 8px;
      font-size: 16px;
    }

    button {
      cursor: pointer;
      border: none;
      border-radius: 6px;
    }

    .guardar {
      background: #2ecc71;
      color: white;
    }

    .cancelar {
      background: #eee;
      color: black;
    }

    .editar {
      background: #3498db;
      color: white;
    }

    .eliminar {
      background: #e74c3c;
      color: white;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      padding: 0;
      overflow: hidden;
    }

    th, td {
      border-bottom: 1px solid #ddd;
      padding: 15px;
      text-align: center;
      font-size: 18px;
    }

    th {
      background: #fafafa;
    }

    .positivo {
      color: green;
    }

    .negativo {
      color: red;
    }

    .mensaje {
      text-align: center;
      font-weight: bold;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <h1>Control de Gastos Personales</h1>

  <div class="resumen">
    <div>
      <h3>Ingresos</h3>
      <p id="totalIngresos">$0</p>
    </div>
    <div>
      <h3>Gastos</h3>
      <p id="totalGastos">$0</p>
    </div>
    <div>
      <h3>Balance</h3>
      <p id="balance">$0</p>
    </div>
  </div>

  <form id="formTransaccion">
    <input type="hidden" id="id">

    <input type="text" id="descripcion" placeholder="Descripción" required minlength="3">
    <input type="number" id="monto" placeholder="Monto" required min="1">

    <select id="tipo" required>
      <option value="">Tipo</option>
      <option value="ingreso">Ingreso</option>
      <option value="gasto">Gasto</option>
    </select>

    <input type="text" id="categoria" placeholder="Categoría" required minlength="2">
    <input type="date" id="fecha" required>

    <button class="guardar" type="submit">Guardar</button>
    <button class="cancelar" type="button" onclick="limpiarFormulario()">Cancelar</button>

    <p id="mensaje" class="mensaje"></p>
  </form>

  <form>
    <input type="text" id="filtroCategoria" placeholder="Filtrar por categoría" oninput="mostrarTransacciones()">

    <select id="filtroTipo" onchange="mostrarTransacciones()">
      <option value="">Todos</option>
      <option value="ingreso">Ingresos</option>
      <option value="gasto">Gastos</option>
    </select>
  </form>

  <table>
    <thead>
      <tr>
        <th>Descripción</th>
        <th>Monto</th>
        <th>Tipo</th>
        <th>Categoría</th>
        <th>Fecha</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody id="tablaTransacciones"></tbody>
  </table>

  <script>
    const API_URL = 'http://localhost:3000/api/transacciones';
    let transacciones = [];

    function formatearMoneda(valor) {
      return valor.toLocaleString('es-CO', {
        style: 'currency',
        currency: 'COP',
        minimumFractionDigits: 0
      });
    }

    function mostrarMensaje(texto, color = 'green') {
      const mensaje = document.getElementById('mensaje');
      mensaje.textContent = texto;
      mensaje.style.color = color;

      setTimeout(() => {
        mensaje.textContent = '';
      }, 3000);
    }

    async function cargarTransacciones() {
      try {
        const respuesta = await fetch(API_URL);
        transacciones = await respuesta.json();

        mostrarTransacciones();
        actualizarResumen();
      } catch (error) {
        mostrarMensaje('Error al cargar transacciones', 'red');
      }
    }

    function mostrarTransacciones() {
      const tabla = document.getElementById('tablaTransacciones');
      const filtroCategoria = document.getElementById('filtroCategoria').value.toLowerCase();
      const filtroTipo = document.getElementById('filtroTipo').value;

      tabla.innerHTML = '';

      const filtradas = transacciones.filter(t => {
        const coincideCategoria = t.categoria.toLowerCase().includes(filtroCategoria);
        const coincideTipo = filtroTipo === '' || t.tipo === filtroTipo;
        return coincideCategoria && coincideTipo;
      });

      if (filtradas.length === 0) {
        tabla.innerHTML = `
          <tr>
            <td colspan="6">No hay transacciones registradas</td>
          </tr>
        `;
        return;
      }

      filtradas.forEach(t => {
        const fila = document.createElement('tr');

        fila.innerHTML = `
          <td>${t.descripcion}</td>
          <td>${formatearMoneda(Number(t.monto))}</td>
          <td>${t.tipo}</td>
          <td>${t.categoria}</td>
          <td>${new Date(t.fecha).toLocaleDateString('es-CO')}</td>
          <td>
            <button class="editar" onclick='editarTransaccion(${JSON.stringify(t)})'>Editar</button>
            <button class="eliminar" onclick="eliminarTransaccion('${t._id}')">Eliminar</button>
          </td>
        `;

        tabla.appendChild(fila);
      });
    }

    function actualizarResumen() {
      const ingresos = transacciones
        .filter(t => t.tipo === 'ingreso')
        .reduce((total, t) => total + Number(t.monto), 0);

      const gastos = transacciones
        .filter(t => t.tipo === 'gasto')
        .reduce((total, t) => total + Number(t.monto), 0);

      const balance = ingresos - gastos;

      document.getElementById('totalIngresos').textContent = formatearMoneda(ingresos);
      document.getElementById('totalGastos').textContent = formatearMoneda(gastos);

      const balanceElemento = document.getElementById('balance');
      balanceElemento.textContent = formatearMoneda(balance);

      balanceElemento.classList.remove('positivo', 'negativo');

      if (balance >= 0) {
        balanceElemento.classList.add('positivo');
      } else {
        balanceElemento.classList.add('negativo');
      }
    }

    document.getElementById('formTransaccion').addEventListener('submit', async (e) => {
      e.preventDefault();

      const id = document.getElementById('id').value;

      const transaccion = {
        descripcion: document.getElementById('descripcion').value.trim(),
        monto: Number(document.getElementById('monto').value),
        tipo: document.getElementById('tipo').value,
        categoria: document.getElementById('categoria').value.trim(),
        fecha: document.getElementById('fecha').value
      };

      if (
        !transaccion.descripcion ||
        !transaccion.monto ||
        !transaccion.tipo ||
        !transaccion.categoria ||
        !transaccion.fecha
      ) {
        mostrarMensaje('Completa todos los campos', 'red');
        return;
      }

      if (transaccion.descripcion.length < 3) {
        mostrarMensaje('La descripción debe tener al menos 3 caracteres', 'red');
        return;
      }

      if (transaccion.categoria.length < 2) {
        mostrarMensaje('La categoría debe tener al menos 2 caracteres', 'red');
        return;
      }

      if (transaccion.monto <= 0) {
        mostrarMensaje('El monto debe ser mayor a 0', 'red');
        return;
      }

      try {
        if (id) {
          const confirmar = confirm('¿Deseas actualizar esta transacción?');
          if (!confirmar) return;

          await fetch(`${API_URL}/${id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(transaccion)
          });

          mostrarMensaje('Transacción actualizada correctamente');
        } else {
          await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(transaccion)
          });

          mostrarMensaje('Transacción guardada correctamente');
        }

        limpiarFormulario();
        cargarTransacciones();

      } catch (error) {
        mostrarMensaje('Error al guardar la transacción', 'red');
      }
    });

    function editarTransaccion(t) {
      document.getElementById('id').value = t._id;
      document.getElementById('descripcion').value = t.descripcion;
      document.getElementById('monto').value = t.monto;
      document.getElementById('tipo').value = t.tipo;
      document.getElementById('categoria').value = t.categoria;
      document.getElementById('fecha').value = t.fecha.split('T')[0];

      window.scrollTo({
        top: 0,
        behavior: 'smooth'
      });
    }

    async function eliminarTransaccion(id) {
      const confirmar = confirm('¿Seguro que deseas eliminar esta transacción?');

      if (!confirmar) return;

      try {
        await fetch(`${API_URL}/${id}`, {
          method: 'DELETE'
        });

        mostrarMensaje('Transacción eliminada correctamente');
        cargarTransacciones();

      } catch (error) {
        mostrarMensaje('Error al eliminar la transacción', 'red');
      }
    }

    function limpiarFormulario() {
      document.getElementById('formTransaccion').reset();
      document.getElementById('id').value = '';
    }

    cargarTransacciones();
  </script>

</body>
</html>
